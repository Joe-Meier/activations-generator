
<!DOCTYPE html>

const FONTS = `@import url('https://fonts.googleapis.com/css2?family=Barlow+Condensed:ital,wght@0,400;0,600;0,700;1,700;1,900&family=Barlow:wght@300;400;500;600&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;0,700;1,300;1,400;1,600;1,700&family=Source+Serif+4:ital,wght@0,400;0,600;0,700;0,800;1,400;1,700&family=Libre+Franklin:wght@400;500;600;700;800;900&display=swap');`;

const css = `
${FONTS}
*{box-sizing:border-box;margin:0;padding:0;}
:root{--gold:#C9A84C;--gold-light:#E8CC7A;--ink:#0D0D0B;--off-white:#F2EFE6;--muted:#7A7870;--border:rgba(201,168,76,0.2);}
body{font-family:'Barlow',sans-serif;background:var(--ink);color:var(--off-white);}

.entry-screen{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 24px;position:relative;overflow:hidden;}
.entry-screen::before{content:'';position:absolute;top:-200px;left:50%;transform:translateX(-50%);width:900px;height:600px;background:radial-gradient(ellipse,rgba(201,168,76,0.07) 0%,transparent 70%);pointer-events:none;}
.agency-wordmark{font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:600;letter-spacing:0.35em;text-transform:uppercase;color:var(--gold);margin-bottom:80px;opacity:0.8;}
.entry-headline{font-family:'Cormorant Garamond',serif;font-size:clamp(40px,9vw,96px);font-weight:700;line-height:0.9;text-align:center;max-width:860px;margin-bottom:16px;letter-spacing:-0.02em;}
.entry-headline em{font-style:italic;color:var(--gold);}
.entry-sub{font-size:14px;font-weight:300;color:var(--muted);text-align:center;max-width:380px;line-height:1.7;margin-bottom:64px;}
.idea-box{width:100%;max-width:580px;border:1px solid var(--border);}
.idea-label{font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:600;letter-spacing:0.3em;text-transform:uppercase;color:var(--gold);padding:14px 20px 10px;border-bottom:1px solid var(--border);background:rgba(201,168,76,0.03);}
.idea-textarea{background:transparent;border:none;color:var(--off-white);font-family:'Cormorant Garamond',serif;font-size:20px;line-height:1.5;padding:20px;resize:none;outline:none;min-height:110px;font-style:italic;width:100%;display:block;}
.idea-textarea::placeholder{color:rgba(242,239,230,0.2);}
.submit-btn{background:var(--gold);color:var(--ink);border:none;font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;letter-spacing:0.3em;text-transform:uppercase;padding:18px 28px;cursor:pointer;transition:background 0.2s;width:100%;text-align:left;display:flex;justify-content:space-between;align-items:center;}
.submit-btn:hover{background:var(--gold-light);}
.submit-btn:disabled{opacity:0.5;cursor:not-allowed;}

.loading-screen{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:32px;padding:40px;}
.loading-stage{font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:600;letter-spacing:0.3em;text-transform:uppercase;color:var(--gold);}
.loading-title{font-family:'Cormorant Garamond',serif;font-size:clamp(24px,5vw,48px);font-weight:600;text-align:center;max-width:600px;line-height:1.2;font-style:italic;}
.loading-bar-track{width:240px;height:1px;background:rgba(201,168,76,0.15);position:relative;overflow:hidden;}
.loading-bar-fill{position:absolute;top:0;left:0;height:100%;background:var(--gold);animation:loadfill 2.8s ease-in-out infinite;}
@keyframes loadfill{0%{left:-100%;width:60%}50%{left:60%;width:60%}100%{left:200%;width:60%}}
.loading-steps{display:flex;flex-direction:column;gap:8px;align-items:center;}
.loading-step{font-size:12px;font-weight:300;color:rgba(122,120,112,0.4);}
.loading-step.active{color:var(--off-white);}

.case-study{animation:fadeIn 0.6s ease forwards;}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
.cs-hero{min-height:100vh;display:flex;flex-direction:column;justify-content:flex-end;padding:80px;position:relative;overflow:hidden;border-bottom:1px solid var(--border);}
.cs-hero::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 100% 80% at 70% 20%,rgba(201,168,76,0.06) 0%,transparent 60%);pointer-events:none;}
.cs-hero-eyebrow{display:flex;align-items:center;gap:24px;margin-bottom:48px;}
.cs-client{font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:600;letter-spacing:0.35em;text-transform:uppercase;color:var(--gold);}
.cs-divider-dot{width:4px;height:4px;background:var(--muted);border-radius:50%;}
.cs-year{font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:400;letter-spacing:0.2em;color:var(--muted);}
.cs-campaign{font-family:'Cormorant Garamond',serif;font-size:clamp(52px,8vw,110px);font-weight:700;line-height:0.88;letter-spacing:-0.02em;max-width:900px;margin-bottom:48px;}
.cs-campaign em{font-style:italic;color:var(--gold);}
.cs-meta-row{display:flex;gap:60px;flex-wrap:wrap;}
.cs-meta-label{font-family:'Barlow Condensed',sans-serif;font-size:9px;font-weight:600;letter-spacing:0.3em;text-transform:uppercase;color:var(--muted);margin-bottom:6px;}
.cs-meta-value{font-size:14px;font-weight:300;color:var(--off-white);}
.cs-section{padding:100px 80px;border-bottom:1px solid rgba(242,239,230,0.06);}
.cs-section-label{font-family:'Barlow Condensed',sans-serif;font-size:9px;font-weight:600;letter-spacing:0.35em;text-transform:uppercase;color:var(--gold);margin-bottom:40px;display:flex;align-items:center;gap:16px;}
.cs-section-label::after{content:'';flex:1;max-width:60px;height:1px;background:var(--border);}
.cs-body{font-family:'Cormorant Garamond',serif;font-size:clamp(22px,3vw,32px);font-weight:300;line-height:1.5;max-width:720px;color:rgba(242,239,230,0.9);}
.cs-insight-pull{font-family:'Cormorant Garamond',serif;font-size:clamp(36px,5vw,64px);font-weight:700;font-style:italic;line-height:1.1;color:var(--gold);max-width:800px;border-left:2px solid var(--gold);padding-left:40px;margin-top:60px;}
.metrics-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:1px;background:var(--border);border:1px solid var(--border);margin-top:60px;}
.metric-cell{background:var(--ink);padding:48px 40px;}
.metric-number{font-family:'Cormorant Garamond',serif;font-size:clamp(48px,6vw,72px);font-weight:700;color:var(--gold);line-height:1;margin-bottom:8px;}
.metric-label{font-size:12px;font-weight:300;color:var(--muted);line-height:1.4;max-width:160px;}
.press-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:20px;margin-top:48px;align-items:start;}
.awards-shelf{display:flex;flex-wrap:wrap;gap:16px;margin-top:48px;}
.award-badge{border:1px solid var(--border);padding:20px 28px;min-width:175px;}
.award-show{font-family:'Barlow Condensed',sans-serif;font-size:9px;font-weight:700;letter-spacing:0.3em;text-transform:uppercase;color:var(--gold);}
.award-level{font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:700;color:var(--off-white);line-height:1;}
.award-cat{font-size:11px;font-weight:300;color:var(--muted);line-height:1.4;margin-top:4px;}
.quote-grid{display:grid;grid-template-columns:1fr 1fr;gap:24px;}
.quote-card{padding:48px;border:1px solid var(--border);position:relative;}
.quote-mark{font-family:'Cormorant Garamond',serif;font-size:80px;line-height:0.5;color:var(--gold);opacity:0.18;position:absolute;top:36px;left:40px;}
.quote-text{font-family:'Cormorant Garamond',serif;font-size:18px;font-style:italic;line-height:1.6;color:rgba(242,239,230,0.85);margin-top:28px;}
.quote-attr{margin-top:24px;border-top:1px solid rgba(242,239,230,0.07);padding-top:16px;}
.quote-name{font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;letter-spacing:0.2em;text-transform:uppercase;color:var(--gold);}
.quote-title{font-size:12px;font-weight:300;color:var(--muted);margin-top:2px;}
.cs-footer{padding:60px 80px;display:flex;justify-content:space-between;align-items:center;border-top:1px solid var(--border);flex-wrap:wrap;gap:24px;}
.cs-footer-wordmark{font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:600;letter-spacing:0.35em;text-transform:uppercase;color:var(--gold);opacity:0.5;}
.cs-footer-disc{font-size:11px;color:var(--muted);font-style:italic;max-width:360px;text-align:center;}
.cs-footer-btn{font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:600;letter-spacing:0.25em;text-transform:uppercase;color:var(--muted);cursor:pointer;background:none;border:1px solid rgba(122,120,112,0.3);padding:10px 20px;transition:all 0.2s;}
.cs-footer-btn:hover{border-color:var(--gold);color:var(--gold);}

/* ── IMAGE UPLOAD ── */
.img-upload-zone{border:1px dashed var(--border);padding:32px;text-align:center;cursor:pointer;transition:all 0.2s;position:relative;margin:0 80px;}
.img-upload-zone:hover,.img-upload-zone.drag{border-color:var(--gold);background:rgba(201,168,76,0.04);}
.img-upload-label{font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:600;letter-spacing:0.25em;text-transform:uppercase;color:var(--muted);}
.img-upload-label em{color:var(--gold);font-style:normal;}
.img-preview{width:100%;height:220px;object-fit:cover;display:block;}
.img-clear{position:absolute;top:12px;right:12px;background:rgba(13,13,11,0.8);border:1px solid var(--border);color:var(--muted);font-size:11px;font-weight:600;padding:4px 10px;cursor:pointer;font-family:'Barlow Condensed',sans-serif;letter-spacing:0.1em;text-transform:uppercase;}
.img-clear:hover{border-color:var(--gold);color:var(--gold);}

/* ── PUBLISH ── */
.pub-bar{position:fixed;top:0;left:0;right:0;z-index:100;background:rgba(13,13,11,0.96);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:0 40px;height:56px;display:flex;align-items:center;justify-content:space-between;}
.pub-bar-left{font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:600;letter-spacing:0.25em;text-transform:uppercase;color:var(--muted);}
.pub-btn{font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;letter-spacing:0.25em;text-transform:uppercase;background:var(--gold);color:var(--ink);border:none;padding:10px 22px;cursor:pointer;transition:background 0.2s;}
.pub-btn:hover{background:var(--gold-light);}
.pub-btn:disabled{opacity:0.5;cursor:not-allowed;}
.pub-btn.ghost{background:none;color:var(--muted);border:1px solid rgba(122,120,112,0.3);}
.pub-btn.ghost:hover{border-color:var(--gold);color:var(--gold);background:none;}
.pub-modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:200;display:flex;align-items:center;justify-content:center;padding:24px;}
.pub-modal{background:#111;border:1px solid var(--border);padding:48px;max-width:500px;width:100%;}
.pub-modal-title{font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:600;letter-spacing:0.3em;text-transform:uppercase;color:var(--gold);margin-bottom:24px;}
.pub-modal h2{font-family:'Cormorant Garamond',serif;font-size:32px;font-weight:700;color:var(--off-white);margin-bottom:8px;}
.pub-modal p{font-size:13px;color:var(--muted);line-height:1.6;margin-bottom:28px;}
.pub-field{margin-bottom:16px;}
.pub-field label{display:block;font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:600;letter-spacing:0.2em;text-transform:uppercase;color:var(--muted);margin-bottom:6px;}
.pub-field input{width:100%;background:#0D0D0B;border:1px solid var(--border);color:var(--off-white);font-size:14px;padding:10px 14px;outline:none;font-family:'Barlow',sans-serif;}
.pub-field input:focus{border-color:var(--gold);}
.pub-field small{display:block;font-size:11px;color:var(--muted);margin-top:5px;opacity:0.7;}
.pub-modal-btns{display:flex;gap:12px;margin-top:28px;}
.pub-success{text-align:center;padding:8px 0;}
.pub-success-url{font-family:'Barlow Condensed',sans-serif;font-size:16px;letter-spacing:0.05em;color:var(--gold);border:1px solid var(--border);padding:14px 20px;margin:20px 0;word-break:break-all;cursor:pointer;}
.pub-success-url:hover{border-color:var(--gold);}
.pub-success small{font-size:11px;color:var(--muted);}

@media(max-width:768px){
  .cs-hero{padding:40px 24px;min-height:auto;padding-top:120px;}
  .cs-section{padding:60px 24px;}
  .quote-grid{grid-template-columns:1fr;}
  .cs-footer{padding:40px 24px;}
  .press-grid{grid-template-columns:1fr;}
}
`;

/* Logo sizing per outlet.
   New logos (adage, drum, campaign) have transparent PNGs — display directly.
   Adweek logo is dark-on-black so invert(1) makes it white.
   Fast Company is transparent PNG.
*/
const LOGO_STYLE = {
  adage:       { height: 30, filter: "none" },
  adweek:      { height: 44, filter: "none" },
  drum:        { height: 44, filter: "none" },
  fastcompany: { height: 26, filter: "none" },
  campaign:    { height: 30, filter: "none" },
};

function OutletLogo({ outlet }) {
  const ls = LOGO_STYLE[outlet];
  if (!ls || !LOGOS[outlet]) return null;
  return (
    <img
      src={LOGOS[outlet]}
      alt={outlet}
      style={{
        height: ls.height,
        width: "auto",
        display: "block",
        filter: ls.filter,
        objectFit: "contain",
        objectPosition: "left center",
      }}
    />
  );
}

/* Varying copy amounts = varying card heights, all same width */
const CARD_SIZE = {
  adage:       { hedSize: 22, showDek: true  },
  adweek:      { hedSize: 26, showDek: true  },
  campaign:    { hedSize: 18, showDek: false },
  drum:        { hedSize: 20, showDek: true  },
  fastcompany: { hedSize: 18, showDek: false },
};

function PressCard({ p }) {
  const cfg = OUTLET_CONFIG[p.outlet];
  const sz  = CARD_SIZE[p.outlet] || { hedSize:22, showDek:true, padding:"28px 28px 24px", span:1 };
  if (!cfg) return null;
  const dark = cfg.bg === "#0a0a0a";
  const ruleColor = dark ? "#222" : "#e8e8e8";

  return (
    <div style={{
      background: cfg.bg,
      border: cfg.border,
      borderRadius: 4,
      padding: "28px 28px 24px",
      display: "flex",
      flexDirection: "column",
      fontFamily: "'Libre Franklin', sans-serif",
    }}>
      {/* Real logo */}
      <OutletLogo outlet={p.outlet} />

      {/* Rule */}
      <div style={{height:1, background:ruleColor, margin:"18px 0 14px"}}/>

      {/* Category */}
      <div style={{fontSize:10, fontWeight:800, textTransform:"uppercase", letterSpacing:"0.1em", color:cfg.accentColor, marginBottom:8}}>
        {p.category || "Creativity"}
      </div>

      {/* Headline */}
      <div style={{
        fontFamily: cfg.hedFont,
        fontSize: sz.hedSize,
        fontWeight: cfg.hedWeight,
        color: cfg.hedColor,
        lineHeight: 1.15,
        marginBottom: (sz.showDek && p.dek) ? 10 : 14,
        letterSpacing: "-0.01em",
      }}>
        {p.headline}
      </div>

      {/* Dek — only shown for outlets flagged showDek */}
      {sz.showDek && p.dek && (
        <div style={{
          fontSize: 13, lineHeight: 1.55,
          color: dark ? "rgba(255,255,255,0.5)" : "#777",
          marginBottom: 16, fontWeight: 400,
        }}>
          {p.dek}
        </div>
      )}

      {/* Byline */}
      <div style={{
        display:"flex", alignItems:"center", justifyContent:"space-between",
        borderTop:`1px solid ${ruleColor}`, paddingTop:12, marginTop:"auto",
        fontSize:11, color:cfg.metaColor,
      }}>
        <span style={{fontWeight:600}}>{p.authorName}</span>
        <span>{p.date} · {p.readTime} min read</span>
      </div>
    </div>
  );
}

/* ─── Build standalone published HTML ───────────────────────────── */
function buildPublishedHtml(data, slug, domain, uploadedImage) {
  const esc = s => String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
  const campaign = esc(data.campaign||"").replace(/\*([^*]+)\*/g,"<em>$1</em>");

  const metricsHtml = (data.metrics||[]).map(m => `
    <div class="metric-cell">
      <div class="metric-number">${esc(m.number)}</div>
      <div class="metric-label">${esc(m.label)}</div>
    </div>`).join("");

/* ─── Loading screen ─────────────────────────────────────────────── */
const STEPS = [
  "Identifying the cultural tension…",
  "Fabricating the consumer insight…",
  "Inflating the results by 340%…",
  "Selecting award show categories…",
  "Drafting press release hyperbole…",
  "Generating fake journalist bylines…",
  "Adding a quote from the CMO…"
];

function LoadingScreen({ idea }) {
  const [step, setStep] = useState(0);
  useEffect(() => {
    const t = setInterval(() => setStep(s => Math.min(s+1, STEPS.length-1)), 540);
    return () => clearInterval(t);
  }, []);
  return (
    <div className="loading-screen">
      <style>{`@keyframes spin{to{transform:rotate(360deg)}}`}</style>
      <div className="loading-stage">Architecting brilliance</div>
      <div className="loading-title">"{idea}"</div>
      <div className="loading-bar-track"><div className="loading-bar-fill"/></div>
      <div className="loading-steps">
        {STEPS.slice(0, step+1).map((s,i) => (
          <div key={i} className={`loading-step${i===step?" active":""}`}>{s}</div>
        ))}
      </div>
    </div>
  );
}

/* ─── Main app ───────────────────────────────────────────────────── */
function App() {
  const [phase, setPhase] = useState("entry");
  const [idea, setIdea] = useState("");
  const [data, setData] = useState(null);
  const [error, setError] = useState(null);

  async function generate() {
    if (!idea.trim()) return;
    setPhase("loading"); setError(null);
    try {
      const res = await fetch("/api/generate", {
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body: JSON.stringify({
          model:"claude-sonnet-4-20250514",
          max_tokens:2400,
          system:`You generate fake award-winning advertising case studies for terrible creative ideas. Return ONLY valid JSON — no markdown fences, no extra text. Shape:
{"client":"Realistic brand name","campaign":"Pretentious campaign name, use *word* to italicize one key word","year":"Pick a realistic year between 2016 and 2025 — vary it, do not always pick 2024","category":"Pick exactly one of: Experiential, Shopper & Retail, Promo, PR Stunts, Creative Commerce, Social Media, Events & Sponsorship, Design & Packaging, B2B & Trade — choose the one that best fits the campaign idea","agency":"Fake plausible agency name","tagline":"One evocative tagline","challenge":"2-3 sentences of strategy-speak describing the brand's problem","insight":"An obvious truth dressed up as profound wisdom","insightPull":"Short pull quote, max 12 words","idea":"2-3 sentences of elevated agency jargon describing the work","metrics":[{"number":"VARY THIS","label":"VARY THIS — see instructions below"},{"number":"VARY THIS","label":"VARY THIS"},{"number":"VARY THIS","label":"VARY THIS"},{"number":"VARY THIS","label":"VARY THIS"}],"press":[{"outlet":"adage","category":"Use the same category as the campaign","headline":"Breathlessly enthusiastic Ad Age headline 10-16 words","dek":"One dry authoritative sentence that sounds like Ad Age wrote it","authorName":"Fake journalist name","date":"Mar. 4, 2024","readTime":"3"},{"outlet":"adweek","category":"Brand Marketing","headline":"Punchy Adweek headline 10-15 words","dek":"One Adweek-style sentence","authorName":"Fake journalist name","date":"Mar. 5, 2024","readTime":"4"},{"outlet":"campaign","category":"Work","headline":"Campaign UK headline 10-15 words","dek":"One measured British sentence","authorName":"Fake journalist name","date":"5 March 2024","readTime":"3"},{"outlet":"drum","category":"Creativity","headline":"Drum headline 10-14 words","dek":"One enthusiastic sentence","authorName":"Fake journalist name","date":"Mar. 6, 2024","readTime":"2"},{"outlet":"fastcompany","category":"Innovation by Design","kicker":"Most Creative People","headline":"Fast Company headline 10-15 words","dek":"One optimistic forward-looking sentence","authorName":"Fake journalist name","date":"March 7, 2024","readTime":"5"}],"awards":[{"show":"AWARD SHOW NAME","level":"LEVEL","category":"CATEGORY"}],"clientQuote":"Earnest CMO quote about courage and cultural resonance","clientQuoteName":"Full Name","clientQuoteTitle":"CMO, [Brand]","cdQuote":"Insufferably pretentious ECD quote about the work","cdQuoteName":"Full Name","cdQuoteTitle":"ECD, [Agency]"}

METRICS INSTRUCTIONS: Make all 4 metrics feel specific and varied. Mix formats freely — some should be percentages (e.g. "23%", "847%"), some big round numbers (e.g. "2.3M", "14B"), some dollar figures (e.g. "$4.2M"), some rankings or firsts (e.g. "#3 trending", "First brand to..."), some time-based (e.g. "11 days", "72 hours"), some oddly specific (e.g. "38,412 people", "6 continents"). Labels should be specific to the campaign idea, not generic. Never reuse the same format twice in one campaign.

AWARDS INSTRUCTIONS: Generate between 4 and 8 awards total. Make them feel like a realistic haul — most campaigns win a mix of levels. Use this pool of shows: CANNES LIONS, THE ONE SHOW, D&AD, CLIO AWARDS, EFFIE AWARDS, WEBBY AWARDS, ANDY AWARDS, SHORTY AWARDS, LIA (London International Awards), SPIKES ASIA, EPICA AWARDS, ADCOLOR AWARDS, FESTIVAL OF MEDIA, WARC AWARDS. For levels use a realistic spread — most should be SHORTLIST, FINALIST, or BRONZE. A few might be SILVER. Only occasionally GOLD. Almost never GRAND PRIX or equivalent (Black Pencil, Grand Clio) — these should feel like a real surprise when they appear, maybe 1 in 5 campaigns. Always include at least 2 SHORTLIST or FINALIST entries to make it feel real. Vary the categories to match the campaign idea.`,
          messages:[{role:"user",content:`The terrible creative idea: "${idea}"`}]
        })
      });
      const json = await res.json();
      const text = json.content?.[0]?.text || "";
      setData(JSON.parse(text.replace(/```json|```/g,"").trim()));
      setPhase("result");
    } catch(e) {
      setError("Something went wrong. Try again.");
      setPhase("entry");
    }
  }

  const reset = () => { setPhase("entry"); setData(null); setIdea(""); setPublishState("idle"); setPublishedUrl(""); setUploadedImage(null); };

  // ── GitHub publish config ──────────────────────────────────────
  const [showConfig, setShowConfig] = useState(false);
  const [ghToken, setGhToken] = useState("");
  const [ghRepo, setGhRepo] = useState(""); // "username/repo"
  const [ghDomain, setGhDomain] = useState("activations.work");
  const [publishState, setPublishState] = useState("idle"); // idle | publishing | done | error
  const [publishedUrl, setPublishedUrl] = useState("");
  const [publishError, setPublishError] = useState("");
  const [uploadedImage, setUploadedImage] = useState(null); // base64 data URL
  const [isDragging, setIsDragging] = useState(false);

  function resizeImage(file, maxW=1400, maxH=900) {
    return new Promise((resolve) => {
      const img = new Image();
      const url = URL.createObjectURL(file);
      img.onload = () => {
        let w = img.width, h = img.height;
        if (w > maxW) { h = Math.round(h * maxW / w); w = maxW; }
        if (h > maxH) { w = Math.round(w * maxH / h); h = maxH; }
        const canvas = document.createElement('canvas');
        canvas.width = w; canvas.height = h;
        canvas.getContext('2d').drawImage(img, 0, 0, w, h);
        URL.revokeObjectURL(url);
        resolve(canvas.toDataURL('image/jpeg', 0.82));
      };
      img.src = url;
    });
  }

  async function handleImageFile(file) {
    if (!file || !file.type.startsWith('image/')) return;
    const resized = await resizeImage(file);
    setUploadedImage(resized);
  }

  function slugify(str) {
    return str.toLowerCase()
      .replace(/\*([^*]+)\*/g, '$1')
      .replace(/[^a-z0-9]+/g, '-')
      .replace(/^-|-$/g, '')
      .slice(0, 60);
  }

  async function publish() {
    // no guard needed — keys are server-side
    setPublishState("publishing");
    setPublishError("");
    try {
      const slug = slugify(data.campaign || data.client || "case-study");
      const html = buildPublishedHtml(data, slug, ghDomain, uploadedImage);
      const path = `${slug}/index.html`;
      const encoded = btoa(unescape(encodeURIComponent(html)));

      // Build image prompt from campaign data for Pollinations
      const imageKeywords = [data.client, data.campaign?.replace(/\*([^*]+)\*/g,'$1'), data.tagline]
        .filter(Boolean).join(' ').slice(0, 120);
      const imagePrompt = encodeURIComponent(
        `cinematic brand activation campaign photography, dramatic moody lighting, dark background, ${imageKeywords}, award winning, no text, editorial`
      );
      // Use uploaded image if available, otherwise fall back to picsum by index
      const imageUrl = uploadedImage || null;

      const meta = {
        slug,
        client: data.client,
        campaign: data.campaign,
        agency: data.agency,
        tagline: data.tagline,
        year: data.year,
        category: data.category || "Experiential",
        imageUrl,
      };

      const res = await fetch("/api/publish", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ path, content: encoded, message: `Add case study: ${slug}`, meta })
      });

      const resText = await res.text();
      if (!res.ok) {
        let msg = "Publish failed";
        try { msg = JSON.parse(resText).message || msg; } catch(e) {}
        throw new Error(msg);
      }

      const liveUrl = `https://${ghDomain}/${slug}`;
      setPublishedUrl(liveUrl);
      setPublishState("done");
    } catch(e) {
      setPublishError(e.message);
      setPublishState("error");
    }
  }

  return (
    <>
      <style>{css}</style>

        {/* ── Config modal ───────────────────────────────── */}
        {showConfig && (

                <button className="pub-btn" onClick={()=>setShowConfig(false)}>Save Settings</button>

              </div>
            </div>
          </div>

          <div className="entry-screen">
            <div className="agency-wordmark">Validated Creative Archive — Est. 2024</div>

          <div className="case-study">
            <div className="cs-hero">
              <div className="cs-hero-eyebrow">
                <span className="cs-client">{data.client}</span>
                <span className="cs-divider-dot"/>
                <span className="cs-year">{data.year}</span>
              </div>
              <h1 className="cs-campaign" dangerouslySetInnerHTML={{__html:data.campaign.replace(/\*(.*?)\*/g,"<em>$1</em>")}}/>
              <div className="cs-meta-row">
                <div><div className="cs-meta-label">Agency</div><div className="cs-meta-value">{data.agency}</div></div>
                <div><div className="cs-meta-label">Summary</div><div className="cs-meta-value" style={{maxWidth:480}}>{data.tagline}</div></div>
              </div>
            </div>

            <div className="cs-section"><div className="cs-section-label">The Challenge</div><p className="cs-body">{data.challenge}</p></div>
            <div className="cs-section"><div className="cs-section-label">The Insight</div><p className="cs-body">{data.insight}</p><div className="cs-insight-pull">"{data.insightPull}"</div></div>
            <div className="cs-section"><div className="cs-section-label">The Idea</div><p className="cs-body">{data.idea}</p></div>

            <div className="cs-section">
              <div className="cs-section-label">The Results</div>
              <p className="cs-body" style={{fontSize:"clamp(16px,2vw,20px)",color:"var(--muted)"}}>The campaign exceeded every benchmark. Then broke them.</p>
              <div className="metrics-grid">
                {data.metrics.map((m,i)=>(
                  <div className="metric-cell" key={i}>
                    <div className="metric-number">{m.number}</div>
                    <div className="metric-label">{m.label}</div>
                  </div>
                ))}
              </div>
            </div>

            <div className="cs-section">
              <div className="cs-section-label">As Seen In</div>
              <div className="press-grid">
                {(data.press||[]).map((p,i)=><PressCard key={i} p={p}/>)}
              </div>
            </div>

            <div className="cs-section">
              <div className="cs-section-label">Recognition</div>
              <div className="awards-shelf">
                {data.awards.map((a,i)=>(
                  <div className="award-badge" key={i}>
                    <div className="award-show">{a.show}</div>
                    <div className="award-level">{a.level}</div>
                    <div className="award-cat">{a.category}</div>
                  </div>
                ))}
              </div>
            </div>

            <div className="cs-section">
              <div className="cs-section-label">In Their Own Words</div>
              <div className="quote-grid">
                {[
                  {q:data.clientQuote,n:data.clientQuoteName,t:data.clientQuoteTitle},
                  {q:data.cdQuote,n:data.cdQuoteName,t:data.cdQuoteTitle}
                ].map((item,i)=>(
                  <div className="quote-card" key={i}>
                    <div className="quote-mark">"</div>
                    <p className="quote-text">{item.q}</p>
                    <div className="quote-attr">
                      <div className="quote-name">{item.n}</div>
                      <div className="quote-title">{item.t}</div>
                    </div>
                  </div>
                ))}
              </div>
            </div>

            {/* ── Image Upload Zone ── */}
            <div className="img-upload-zone"
              onClick={()=>document.getElementById('img-input').click()}
              onDragOver={e=>{e.preventDefault();setIsDragging(true);}}
              onDragLeave={()=>setIsDragging(false)}
              onDrop={e=>{e.preventDefault();setIsDragging(false);handleImageFile(e.dataTransfer.files[0]);}}
              style={isDragging?{borderColor:'var(--gold)',background:'rgba(201,168,76,0.06)'}:{}}
            >
              <input id="img-input" type="file" accept="image/*" style={{display:'none'}}
                onChange={e=>handleImageFile(e.target.files[0])}/>
              {uploadedImage ? (
                <>
                  <img src={uploadedImage} className="img-preview" alt="Campaign visual"/>
                  <button className="img-clear" onClick={e=>{e.stopPropagation();setUploadedImage(null);}}>✕ Remove</button>
                </>
              ) : (
                <div className="img-upload-label">
                  <div style={{fontSize:28,marginBottom:12,opacity:0.3}}>↑</div>
                  Drop an image or <em>click to upload</em>
                  <div style={{marginTop:6,fontSize:10,opacity:0.5}}>Optional — adds a cover photo to your case study. Any size, auto-resized.</div>
                </div>
              )}
            </div>

            <div className="cs-footer">
              <div className="cs-footer-wordmark">Validated Creative Archive</div>
              <div className="cs-footer-disc">This case study is entirely fabricated. Any resemblance to actual award-winning work is both intentional and devastating.</div>
              <div style={{display:"flex",gap:12,alignItems:"center",flexWrap:"wrap"}}>
                {publishState === "done" ? (
                  <div style={{display:"flex",alignItems:"center",gap:16}}>
                    <div style={{display:"flex",flexDirection:"column",gap:8}}>
                      <a
                        className="pub-success-url"
                        href={publishedUrl}
                        target="_blank"
                        rel="noopener noreferrer"
                        style={{textDecoration:"none",display:"block"}}
                      >
                        ↗ {publishedUrl}
                      </a>
                      <span style={{display:"flex",gap:12,alignItems:"center"}}>
                        <span style={{fontSize:11,color:"var(--muted)"}}>May take ~60s to go live</span>
                        <span style={{fontSize:11,color:"var(--gold)",cursor:"pointer"}} onClick={()=>navigator.clipboard.writeText(publishedUrl)}>Copy link</span>
                      </span>
                    </div>
                  </div>
                ) : (
                  <button
                    className="pub-btn"
                    onClick={publishState === "publishing" ? undefined : publish}
                    disabled={publishState === "publishing"}
                  >
                    {publishState === "publishing" ? "Publishing…" : publishState === "error" ? "Retry Publish ↗" : "Publish ↗"}
                  </button>
                )}
                {publishState === "error" && (
                  <span style={{fontSize:11,color:"#c55"}}>{publishError}</span>
                )}
                <button className="pub-btn ghost" onClick={()=>setShowConfig(true)}>⚙ GitHub</button>
                <button className="cs-footer-btn" onClick={generate}>↺ Regenerate</button>
              <button className="cs-footer-btn" onClick={reset}>← New Bad Idea</button>
              </div>
            </div>
          </div>
        )}
      </div>
    </>
  );
}


const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App/>);
</script>
</body>
</html>
